<div id="wb-bot-container" style="position: fixed; bottom: 30px; right: 30px; z-index: 9999; font-family: 'Inter', sans-serif;">
  
  <div id="wb-chat-window" style="display: none; width: 350px; height: 500px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(0, 210, 255, 0.3); border-radius: 16px; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); margin-bottom: 20px;">
      
      <div style="background: linear-gradient(90deg, #00D2FF, #008cb3); color: #020617; padding: 18px; font-weight: 800; display: flex; justify-content: space-between; align-items: center;">
          <div style="display: flex; align-items: center; gap: 10px;">
              <span style="font-size: 20px;">🤖</span>
              <span>Assistente WB Techland</span>
          </div>
          <button onclick="toggleChat()" style="background: none; border: none; cursor: pointer; font-weight: 900; font-size: 18px; color: #020617;">✕</button>
      </div>

      <div id="chat-messages" style="flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; font-size: 14px; color: #f8fafc;">
          <div style="background: rgba(0,210,255,0.1); border: 1px solid rgba(0,210,255,0.2); padding: 12px 16px; border-radius: 0px 16px 16px 16px; align-self: flex-start; max-width: 85%; line-height: 1.5;">
              Olá! Sou a inteligência de atendimento da <strong>WB Techland</strong>. Qual área da sua empresa precisa de otimização hoje?
          </div>
      </div>

      <div id="chat-options" style="padding: 15px; border-top: 1px solid rgba(0,210,255,0.1); display: flex; flex-wrap: wrap; gap: 8px; background: rgba(2, 6, 23, 0.8);">
          <button onclick="sendOption('Sistemas')" style="background: transparent; border: 1px solid #00D2FF; color: #00D2FF; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s;" onmouseover="this.style.background='rgba(0,210,255,0.1)'" onmouseout="this.style.background='transparent'">💻 Sistemas</button>
          
          <button onclick="sendOption('Hardware')" style="background: transparent; border: 1px solid #00D2FF; color: #00D2FF; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s;" onmouseover="this.style.background='rgba(0,210,255,0.1)'" onmouseout="this.style.background='transparent'">⚙️ Hardware</button>
          
          <button onclick="sendOption('Redes')" style="background: transparent; border: 1px solid #00D2FF; color: #00D2FF; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.3s;" onmouseover="this.style.background='rgba(0,210,255,0.1)'" onmouseout="this.style.background='transparent'">🌐 Redes</button>
      </div>
  </div>

  <button id="wb-bot-btn" onclick="toggleChat()" style="background: #00D2FF; width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(0,210,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 28px; float: right; transition: transform 0.3s;">🤖</button>

</div>

<script>
function toggleChat() {
    const chat = document.getElementById('wb-chat-window');
    chat.style.display = chat.style.display === 'none' || chat.style.display === '' ? 'flex' : 'none';
}

function sendOption(option) {
    const msgArea = document.getElementById('chat-messages');
    
    // Adiciona a mensagem do usuário na tela (Lado direito)
    msgArea.innerHTML += `
      <div style="background: #00D2FF; color: #020617; font-weight: 600; padding: 12px 16px; border-radius: 16px 0px 16px 16px; align-self: flex-end; max-width: 85%;">
        ${option}
      </div>`;
    
    // Desce a barra de rolagem
    msgArea.scrollTop = msgArea.scrollHeight;

    // Chama o servidor (SquareCloud) para pegar a resposta
    fetch('/bot-response?choice=' + option)
        .then(res => res.json())
        .then(data => {
            // Adiciona a resposta do Bot na tela (Lado esquerdo)
            setTimeout(() => {
              msgArea.innerHTML += `
                <div style="background: rgba(0,210,255,0.1); border: 1px solid rgba(0,210,255,0.2); padding: 12px 16px; border-radius: 0px 16px 16px 16px; align-self: flex-start; max-width: 85%; line-height: 1.5;">
                  ${data.reply}
                </div>`;
              msgArea.scrollTop = msgArea.scrollHeight;
            }, 600); // Um pequeno delay de 600ms para parecer que o bot está "pensando"
        })
        .catch(err => console.error("Erro ao contactar o bot:", err));
}
</script>
